services:
  postgres-lab-service:
    container_name: postgres-lab-database
    image: postgres:18.4-alpine3.24
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres_lab
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-lab-data:/var/lib/postgresql

volumes:
  postgres-lab-data:
    name: postgres-lab-data
